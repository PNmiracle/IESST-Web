services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.mentor
    image: iesst-academic-platform:mentor
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev,dev-demo
      DB_URL: jdbc:mysql://mysql:3306/iesst?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: iesst_mentor
      DB_PASSWORD: mentor_db_2026
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: mentor123456
      ADMIN_DISPLAY_NAME: IESST 演示管理员
      SESSION_COOKIE_SECURE: "false"
      PII_ENCRYPTION_KEY: 0W1GbO5dy1E4E3Q3HCoD3rO30UyI1c36J6pSfh3B6FA=
      PII_LOOKUP_KEY: 85Kn5tbqUTkFuy/0gjswZPC0Gwl3xnHjg55MtYF4ZyA=
      UPLOAD_DIR: /data/iesst/uploads
      PRIVATE_UPLOAD_DIR: /data/iesst/private-uploads
      MANUSCRIPT_STORAGE_BACKEND: local
      MALWARE_SCAN_ENABLED: "false"
    ports:
      - "${IESST_PORT:-8080}:8080"
    volumes:
      - mentor_uploads:/data/iesst/uploads
      - mentor_private_uploads:/data/iesst/private-uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 30

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: iesst
      MYSQL_USER: iesst_mentor
      MYSQL_PASSWORD: mentor_db_2026
      MYSQL_ROOT_PASSWORD: mentor_root_2026
      TZ: Asia/Shanghai
    volumes:
      - mentor_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mentor_mysql_data:
  mentor_uploads:
  mentor_private_uploads:
