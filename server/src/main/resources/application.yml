server:
  port: 8080
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30m}
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}
  forward-headers-strategy: framework

spring:
  profiles:
    default: dev
  application:
    name: iesst-demo-server
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/iesst?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:iesst}
    password: ${DB_PASSWORD:iesst123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  private-upload-dir: ${PRIVATE_UPLOAD_DIR:./private-uploads}
  manuscript-storage:
    backend: ${MANUSCRIPT_STORAGE_BACKEND:local}
    signed-url-seconds: ${MANUSCRIPT_SIGNED_URL_SECONDS:300}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      bucket: ${OSS_BUCKET:}
      access-key-id: ${OSS_ACCESS_KEY_ID:}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
      prefix: ${OSS_MANUSCRIPT_PREFIX:manuscripts}
  malware-scan:
    enabled: ${MALWARE_SCAN_ENABLED:false}
    host: ${CLAMAV_HOST:127.0.0.1}
    port: ${CLAMAV_PORT:3310}
    timeout: ${CLAMAV_TIMEOUT:30s}
  pii:
    encryption-key: ${PII_ENCRYPTION_KEY:9Bethbu5tzCygaJT47X73WcQ2oaGXPXSzLaW0ObFGHo=}
    lookup-key: ${PII_LOOKUP_KEY:ZKTvfWmq/HWuxjY6NdEzGJLg4fwiOjhl8Q38RkxKaRI=}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123123}
    display-name: ${ADMIN_DISPLAY_NAME:IESST 管理员}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: IESST Academic Platform
    version: 0.2.0

logging:
  level:
    cn.iesst.demo: INFO
