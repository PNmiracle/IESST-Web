services:
  mysql:
    image: mysql:8.4
    container_name: iesst-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: iesst
      MYSQL_USER: iesst
      MYSQL_PASSWORD: iesst123
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - iesst_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  iesst_mysql_data:
